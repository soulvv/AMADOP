apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-deployment
  namespace: amadop
  labels:
    app: ai-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8005"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: ai-service
        image: amadop-ai_service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8005
        env:
        - name: PORT
          value: "8005"
        - name: ENVIRONMENT
          value: "kubernetes"
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: amadop-secrets
              key: OPENAI_API_KEY
        - name: NOTIFICATION_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: amadop-config
              key: NOTIFICATION_SERVICE_URL
        - name: PROMETHEUS_URL
          valueFrom:
            configMapKeyRef:
              name: amadop-config
              key: PROMETHEUS_URL
        - name: SCAN_INTERVAL_SECONDS
          valueFrom:
            configMapKeyRef:
              name: amadop-config
              key: SCAN_INTERVAL_SECONDS
        - name: ALERT_COOLDOWN_SECONDS
          valueFrom:
            configMapKeyRef:
              name: amadop-config
              key: ALERT_COOLDOWN_SECONDS
        - name: ADMIN_USER_IDS
          valueFrom:
            configMapKeyRef:
              name: amadop-config
              key: ADMIN_USER_IDS
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "384Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/v1/ai/health
            port: 8005
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/v1/ai/health
            port: 8005
          initialDelaySeconds: 10
          periodSeconds: 5
