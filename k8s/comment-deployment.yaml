apiVersion: apps/v1
kind: Deployment
metadata:
  name: comment-deployment
  namespace: amadop
  labels:
    app: comment-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: comment-service
  template:
    metadata:
      labels:
        app: comment-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8003"
    spec:
      containers:
        - name: comment-service
          image: amadop-comment_service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8003
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: amadop-config
                  key: DATABASE_URL
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: amadop-config
                  key: AUTH_SERVICE_URL
            - name: POST_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: amadop-config
                  key: POST_SERVICE_URL
            - name: NOTIFICATION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: amadop-config
                  key: NOTIFICATION_SERVICE_URL
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: amadop-config
                  key: CORS_ORIGINS
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 5
            successThreshold: 2
