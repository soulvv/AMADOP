version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: amadop_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: amadop_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Auth Service
  auth_service:
    platform: linux/amd64
    build:
      context: ./backend/auth_service
      dockerfile: Dockerfile
    container_name: auth_service
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/amadop_db
      SECRET_KEY: your-secret-key-change-in-production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/auth_service:/app
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8001 --reload

  # Post Service
  post_service:
    platform: linux/amd64
    build:
      context: ./backend/post_service
      dockerfile: Dockerfile
    container_name: post_service
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/amadop_db
      AUTH_SERVICE_URL: http://auth_service:8001
    depends_on:
      db:
        condition: service_healthy
      auth_service:
        condition: service_started
    volumes:
      - ./backend/post_service:/app
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8002 --reload

  # Comment Service
  comment_service:
    platform: linux/amd64
    build:
      context: ./backend/comment_service
      dockerfile: Dockerfile
    container_name: comment_service
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/amadop_db
      AUTH_SERVICE_URL: http://auth_service:8001
      POST_SERVICE_URL: http://post_service:8002
      NOTIFICATION_SERVICE_URL: http://notification_service:8004
    depends_on:
      db:
        condition: service_healthy
      auth_service:
        condition: service_started
      post_service:
        condition: service_started
    volumes:
      - ./backend/comment_service:/app
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8003 --reload

  # Notification Service
  notification_service:
    platform: linux/amd64
    build:
      context: ./backend/notification_service
      dockerfile: Dockerfile
    container_name: notification_service
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/amadop_db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/notification_service:/app
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8004 --reload

  # Frontend
  frontend:
    platform: linux/amd64
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: amadop_frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
